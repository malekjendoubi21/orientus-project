version: '3.8'

# ============================================================
# Orientus — Full Stack Docker Compose
# Services: PostgreSQL, Spring Boot Backend, FastAPI ML, React Frontend
# ============================================================

services:

  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: orientus-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orientus_db}
      POSTGRES_USER: ${POSTGRES_USER:-orientus_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orientus_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orientus_user} -d ${POSTGRES_DB:-orientus_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orientus-network

  # ── Spring Boot Backend ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orientus-backend
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-orientus_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-orientus_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-orientus_pass}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      # Email
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      # Groq AI
      GROQ_API_KEY: ${GROQ_API_KEY}
      # ML Service
      ML_API_URL: http://ml:5000
      # Frontend URL (used in email links)
      APP_FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      # API rate limiting
      APP_RATE_LIMIT_CHATBOT_PER_MINUTE: ${APP_RATE_LIMIT_CHATBOT_PER_MINUTE:-30}
      APP_RATE_LIMIT_RECOMMENDATIONS_PER_MINUTE: ${APP_RATE_LIMIT_RECOMMENDATIONS_PER_MINUTE:-20}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      ml:
        condition: service_started
    networks:
      - orientus-network

  # ── FastAPI ML Recommendation Service ─────────────────────
  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: orientus-ml
    restart: unless-stopped
    # Pas de mapping de port vers l'hôte : le service ML est accessible
    # uniquement par le backend via le réseau Docker interne (http://ml:5000).
    # Le healthcheck utilise localhost INTERNE au conteneur — pas besoin du port exposé.
    volumes:
      - ./ml/models:/app/models
      - ./ml/data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - orientus-network

  # ── React Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8084/api}
        VITE_WS_URL: ${VITE_WS_URL:-http://localhost:8084/ws}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY}
    container_name: orientus-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - orientus-network

# ── Persistent Volumes ─────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

# ── Internal Network ───────────────────────────────────────
networks:
  orientus-network:
    driver: bridge
