spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:nader.bmimoun@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:gqotkzzmvwyowotv}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ============================================
# AMELIORATION 8 : Connection pool optimise pour free tier
# ============================================
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.keepalive-time=60000

# Desactiver JMX pour accelerer le boot
spring.jmx.enabled=false

# ============================================
# ML API Configuration
# ============================================
ml.api.url=${ML_API_URL:http://localhost:5000}

# ============================================
# Frontend URL (for email links)
# ============================================
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

