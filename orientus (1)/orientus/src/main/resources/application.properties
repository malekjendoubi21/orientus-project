# Application
spring.application.name=orientus

# Database PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orientus_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:orientus_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:orientus_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway - DESACTIVE
spring.flyway.enabled=false

# Server
server.port=8084

# JWT
jwt.secret=${JWT_SECRET:OrientusSecretKeyForJWTMustBeLongEnoughForHS512Algorithm2024SecureKey!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Upload fichiers
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logs
logging.level.root=INFO
logging.level.com.example.orientus=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# ============================================
# CHATBOT CONFIGURATION
# ============================================
# Groq LLM API
groq.api.key=${GROQ_API_KEY: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}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile
groq.temperature=0.3
groq.max-tokens=2000

# Excel Import Configuration
excel.import.path=classpath:data/partner-universities.xlsx
excel.import.enabled=true

